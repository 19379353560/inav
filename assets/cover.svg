<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">INAV firmware experiments</title>
  <desc id="desc">A technical banner for INAV firmware experiments covering D-term pre-differentiation filtering and SkyPilot H743 support.</desc>
  <rect width="1200" height="420" fill="#f9fafb"/>
